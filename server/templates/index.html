<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OpenEnv AI Email Triage</title>
    <style>
        :root {
            --bg: #0f172a;
            --surface: #1e293b;
            --surface-glass: rgba(30, 41, 59, 0.7);
            --surface-hover: #334155;
            --primary: #6366f1;
            --primary-hover: #4f46e5;
            --text: #f8fafc;
            --text-title: #ffffff;
            --text-muted: #94a3b8;
            --border: rgba(255, 255, 255, 0.05);
            --badge-bg: rgba(255, 255, 255, 0.1);
            --email-body: #cbd5e1;
            --agent-bg: rgba(30, 41, 59, 0.9);

            --danger: #ef4444;
            --success: #22c55e;
            --spam: #f59e0b;
        }

        [data-theme="light"] {
            --bg: #f8fafc;
            --surface: #ffffff;
            --surface-glass: rgba(255, 255, 255, 0.8);
            --surface-hover: #f1f5f9;
            --primary: #4f46e5;
            --primary-hover: #4338ca;
            --text: #0f172a;
            --text-title: #020617;
            --text-muted: #64748b;
            --border: rgba(0, 0, 0, 0.08);
            --badge-bg: rgba(0, 0, 0, 0.06);
            --email-body: #334155;
            --agent-bg: rgba(255, 255, 255, 0.95);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            height: 100vh;
            display: flex;
            overflow: hidden;
        }

        /* Sidebar */
        .sidebar {
            width: 280px;
            background: var(--surface-glass);
            backdrop-filter: blur(12px);
            border-right: 1px solid var(--border);
            padding: 24px;
            display: flex;
            flex-direction: column;
        }

        .logo {
            font-size: 20px;
            font-weight: 700;
            margin-bottom: 40px;
            display: flex;
            align-items: center;
            gap: 12px;
            color: var(--text);
        }

        .nav-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 16px;
            border-radius: 8px;
            color: var(--text-muted);
            cursor: pointer;
            transition: all 0.2s;
            margin-bottom: 8px;
            font-weight: 500;
        }

        .nav-item.active {
            background: var(--primary);
            color: white;
        }

        .nav-item:hover:not(.active) {
            background: var(--surface-hover);
            color: var(--text);
        }

        .badge {
            background: var(--badge-bg);
            padding: 2px 8px;
            border-radius: 12px;
            font-size: 12px;
            color: var(--text-title);
        }

        /* Main Content */
        .main {
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        .header {
            height: 70px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 40px;
        }

        .agent-controls {
            display: flex;
            gap: 16px;
            align-items: center;
        }

        .btn {
            background: var(--primary);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .btn:hover {
            background: var(--primary-hover);
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .btn-outline {
            background: transparent;
            border: 1px solid var(--primary);
            color: var(--primary);
        }

        /* Email List & Viewing Area */
        .content-area {
            display: flex;
            flex: 1;
            overflow: hidden;
        }

        .email-list {
            width: 400px;
            border-right: 1px solid var(--border);
            overflow-y: auto;
            display: flex;
            flex-direction: column;
        }

        .email-item {
            padding: 20px;
            border-bottom: 1px solid var(--border);
            cursor: pointer;
            transition: 0.2s;
            position: relative;
        }

        .email-item:hover {
            background: var(--surface);
        }

        .email-item.active {
            background: rgba(99, 102, 241, 0.1);
            border-left: 3px solid var(--primary);
        }

        .email-sender {
            font-weight: 600;
            margin-bottom: 6px;
            font-size: 15px;
        }

        .email-subject {
            color: var(--text);
            font-size: 14px;
            margin-bottom: 8px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .email-preview {
            color: var(--text-muted);
            font-size: 13px;
            line-height: 1.4;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        /* Reading Pane */
        .reading-pane {
            flex: 1;
            padding: 40px;
            overflow-y: auto;
            position: relative;
        }

        .email-full-subject {
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 24px;
            color: var(--text-title);
        }

        .email-meta {
            display: flex;
            align-items: center;
            gap: 16px;
            margin-bottom: 32px;
            padding-bottom: 24px;
            border-bottom: 1px solid var(--border);
        }

        .avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--primary), #8b5cf6);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 18px;
        }

        .email-body {
            font-size: 15px;
            line-height: 1.6;
            color: var(--email-body);
            white-space: pre-wrap;
        }

        /* Agent Overlay Action */
        .agent-action-overlay {
            position: absolute;
            bottom: 40px;
            right: 40px;
            background: var(--agent-bg);
            backdrop-filter: blur(8px);
            border: 1px solid var(--border);
            padding: 24px;
            border-radius: 12px;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.5);
            max-width: 400px;
            transform: translateY(20px);
            opacity: 0;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            pointer-events: none;
        }

        .agent-action-overlay.visible {
            transform: translateY(0);
            opacity: 1;
        }

        .action-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 16px;
            color: var(--primary);
            font-weight: 600;
        }

        .action-chip {
            background: var(--badge-bg);
            padding: 4px 12px;
            border-radius: 16px;
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
        }

        .action-chip.archive {
            background: rgba(245, 158, 11, 0.2);
            color: #fbbf24;
        }

        .action-chip.reply {
            background: rgba(34, 197, 94, 0.2);
            color: #4ade80;
        }

        .action-chip.escalate {
            background: rgba(239, 68, 68, 0.2);
            color: #f87171;
        }

        .ai-typing {
            font-family: monospace;
            color: var(--text-muted);
            border-left: 2px solid var(--primary);
            padding-left: 12px;
            margin-top: 12px;
            font-size: 13px;
        }

        .reward-badge {
            display: inline-block;
            margin-top: 16px;
            padding: 4px 10px;
            border-radius: 4px;
            font-size: 12px;
            background: rgba(34, 197, 94, 0.2);
            color: #4ade80;
            border: 1px solid rgba(34, 197, 94, 0.3);
        }

        .reward-badge.negative {
            background: rgba(239, 68, 68, 0.2);
            color: #f87171;
            border-color: rgba(239, 68, 68, 0.3);
        }

        /* Stats */
        .stats-bar {
            display: flex;
            gap: 24px;
            font-size: 13px;
            color: var(--text-muted);
        }

        .stat-value {
            color: var(--text-title);
            font-weight: 600;
            margin-left: 6px;
        }

        /* Animations */
        @keyframes pulse {
            0% {
                transform: scale(1);
            }

            50% {
                transform: scale(1.05);
            }

            100% {
                transform: scale(1);
            }
        }

        .live-dot {
            width: 8px;
            height: 8px;
            background: var(--success);
            border-radius: 50%;
            display: inline-block;
            animation: pulse 2s infinite;
        }

        /* Fly out animation */
        @keyframes flyOutArchive {
            to {
                transform: translateX(-100%);
                opacity: 0;
            }
        }

        @keyframes flyOutEscalate {
            to {
                transform: translateY(-100%) scale(0.8);
                opacity: 0;
            }
        }

        @keyframes flyOutReply {
            to {
                transform: translateX(100%);
                opacity: 0;
            }
        }

        .anim-archive {
            animation: flyOutArchive 0.5s forwards;
        }

        .anim-escalate {
            animation: flyOutEscalate 0.5s forwards;
        }

        .anim-reply {
            animation: flyOutReply 0.5s forwards;
        }

        /* ======== RESPONSIVE DESIGN ======== */
        @media (max-width: 1024px) {
            .content-area {
                flex-direction: column;
            }

            .email-list {
                width: 100%;
                border-right: none;
                border-bottom: 1px solid var(--border);
            }

            .reading-pane {
                padding: 24px;
            }

            .agent-action-overlay {
                right: 24px;
                bottom: 24px;
                max-width: 320px;
            }
        }

        @media (max-width: 768px) {
            body {
                flex-direction: column;
                overflow-y: auto;
            }

            .sidebar {
                width: 100%;
                height: auto;
                flex-direction: row;
                flex-wrap: wrap;
                align-items: center;
                gap: 12px;
                padding: 16px;
                border-bottom: 1px solid var(--border);
            }

            .logo {
                margin-bottom: 0;
                width: 100%;
                justify-content: center;
            }

            .nav-item {
                flex: 1;
                min-width: 120px;
                margin-bottom: 0;
                font-size: 13px;
                padding: 8px 12px;
            }

            .sidebar>div:last-child {
                display: none;
                /* Hide environment status text on mobile to save space */
            }

            .header {
                height: auto;
                flex-direction: column;
                align-items: center;
                gap: 16px;
                padding: 16px;
            }

            .agent-controls {
                width: 100%;
                flex-wrap: wrap;
                justify-content: center;
            }

            .agent-controls select {
                flex: 1;
            }

            .content-area {
                overflow: visible;
            }

            .reading-pane {
                padding: 16px;
            }

            .email-full-subject {
                font-size: 18px;
            }

            .email-meta {
                flex-direction: column;
                align-items: flex-start;
                gap: 8px;
            }

            .agent-action-overlay {
                position: static;
                margin-top: 24px;
                max-width: 100%;
                transform: none;
            }

            .agent-action-overlay.visible {
                transform: none;
            }
        }
    </style>
</head>

<body>

    <!-- Sidebar -->
    <div class="sidebar">
        <div class="logo">
            📬 Email Triage AI
        </div>

        <div class="nav-item active" id="nav-inbox">
            <span>📥 Inbox</span>
            <span class="badge" id="badge-inbox">10</span>
        </div>
        <div class="nav-item" id="nav-archive">
            <span>📦 Archived</span>
            <span class="badge" id="badge-archive">0</span>
        </div>
        <div class="nav-item" id="nav-escalated">
            <span>🚨 Escalated</span>
            <span class="badge" id="badge-escalated">0</span>
        </div>
        <div class="nav-item" id="nav-replied">
            <span>💬 Replied</span>
            <span class="badge" id="badge-replied">0</span>
        </div>

        <div style="margin-top: auto;">
            <div
                style="font-size: 11px; color: var(--text-muted); margin-bottom: 12px; text-transform: uppercase; letter-spacing: 1px;">
                Environment Status</div>
            <div style="display: flex; align-items: center; gap: 8px; font-size: 13px;">
                <span class="live-dot"></span>
                <span>OpenEnv Loaded</span>
            </div>
            <div style="margin-top: 8px; font-size: 13px; color: var(--text-muted);">
                Task: <span style="color: white;">Hard Mode</span>
            </div>
        </div>
    </div>

    <!-- Main -->
    <div class="main">
        <!-- Header -->
        <div class="header">
            <div class="stats-bar">
                <div>Total Reward: <span class="stat-value" id="stat-reward">0.00</span></div>
                <div>Steps: <span class="stat-value" id="stat-steps">0</span></div>
            </div>
            <div class="agent-controls">
                <button class="btn btn-outline" onclick="toggleTheme()" style="padding: 10px;" title="Toggle Theme">
                    🌓
                </button>
                <select id="task-select"
                    style="background: var(--surface); color: var(--text); border: 1px solid var(--border); padding: 8px; border-radius: 6px;">
                    <option value="easy">Easy</option>
                    <option value="medium">Medium</option>
                    <option value="hard" selected>Hard</option>
                </select>
                <button class="btn btn-outline" id="btn-reset" onclick="resetEnv()">🔄 Reset</button>
                <button class="btn" id="btn-start" onclick="startAgent()">🤖 Start AI Agent</button>
            </div>
        </div>

        <!-- Content -->
        <div class="content-area">
            <!-- Email List -->
            <div class="email-list" id="email-list">
                <!-- Populated via JS -->
            </div>

            <!-- Reading Pane -->
            <div class="reading-pane" id="reading-pane" style="display: none;">
                <div class="email-full-subject" id="read-subject"></div>
                <div class="email-meta">
                    <div class="avatar" id="read-avatar">A</div>
                    <div>
                        <div style="font-weight: 600; color: var(--text-title);" id="read-sender"></div>
                        <div style="font-size: 12px; color: var(--text-muted);" id="read-id"></div>
                    </div>
                </div>
                <div class="email-body" id="read-body"></div>

                <!-- Action Overlay -->
                <div class="agent-action-overlay" id="agent-overlay">
                    <div class="action-header">
                        <span>🤖 Agent Action</span>
                        <span class="action-chip" id="overlay-action">ARCHIVE</span>
                    </div>
                    <div style="font-size: 13px; color: var(--email-body);" id="overlay-desc">Identifying spam
                        patterns...</div>
                    <div class="ai-typing" id="overlay-reply" style="display: none;"></div>
                    <div class="reward-badge" id="overlay-reward">+0.85 Reward</div>
                </div>
            </div>

            <div id="empty-state"
                style="flex:1; display:flex; align-items:center; justify-content:center; color: var(--text-muted); flex-direction: column;">
                <div style="font-size: 48px; margin-bottom: 16px;">📬</div>
                <h3>Inbox is clear!</h3>
                <p style="margin-top: 8px;">Click Reset to load new emails.</p>
            </div>
        </div>
    </div>

    <script>
        function toggleTheme() {
            const currentTheme = document.documentElement.getAttribute('data-theme');
            let newTheme = 'dark';
            if (!currentTheme || currentTheme === 'dark') {
                newTheme = 'light';
            }
            document.documentElement.setAttribute('data-theme', newTheme);
        }

        let currentEmail = null;
        let totalReward = 0;
        let steps = 0;
        let isAgentRunning = false;

        let stats = {
            inbox: 0,
            archive: 0,
            escalated: 0,
            replied: 0
        };

        const sleep = ms => new Promise(r => setTimeout(r, ms));

        function updateStatsUI() {
            document.getElementById('badge-inbox').innerText = stats.inbox;
            document.getElementById('badge-archive').innerText = stats.archive;
            document.getElementById('badge-escalated').innerText = stats.escalated;
            document.getElementById('badge-replied').innerText = stats.replied;
            document.getElementById('stat-reward').innerText = totalReward.toFixed(2);
            document.getElementById('stat-steps').innerText = steps;
        }

        async function resetEnv() {
            const task = document.getElementById('task-select').value;
            const res = await fetch('/reset', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ task_name: task })
            });
            const data = await res.json();

            totalReward = 0;
            steps = 0;
            stats.archive = 0;
            stats.escalated = 0;
            stats.replied = 0;
            stats.inbox = data.observation.inbox_remaining;

            updateStatsUI();

            currentEmail = data.observation.email;
            document.getElementById('empty-state').style.display = 'none';
            document.getElementById('reading-pane').style.display = 'block';

            renderEmailList(currentEmail);
            renderReadingPane(currentEmail);
        }

        function renderEmailList(email) {
            const list = document.getElementById('email-list');
            list.innerHTML = `
                <div class="email-item active" id="email-item">
                    <div class="email-sender">${email.sender}</div>
                    <div class="email-subject">${email.subject}</div>
                    <div class="email-preview">${email.body.substring(0, 60)}...</div>
                </div>
            `;
        }

        function renderReadingPane(email) {
            document.getElementById('read-subject').innerText = email.subject;
            document.getElementById('read-sender').innerText = email.sender;
            document.getElementById('read-id').innerText = "<" + email.sender + "> | " + email.priority;
            document.getElementById('read-body').innerText = email.body;
            document.getElementById('read-avatar').innerText = email.sender.charAt(0).toUpperCase();
            document.getElementById('agent-overlay').classList.remove('visible');
        }

        // Mock LLM inference for visual demo (makes decisions based on expected_action)
        async function startAgent() {
            if (isAgentRunning || !currentEmail) return;
            isAgentRunning = true;
            document.getElementById('btn-start').disabled = true;
            document.getElementById('btn-start').innerText = "🤖 Agent Running...";

            while (currentEmail) {
                // 1. "Thinking" phase
                await sleep(1000);

                // Determine action (cheating by using expected_action for pure UI demo purposes)
                let actionType = currentEmail.expected_action;
                let payload = { action_type: actionType, category_tag: currentEmail.category, routing: currentEmail.routing };

                let text = "Classifying...";
                let contentStr = "";

                if (actionType === 'reply') {
                    payload.content = "Thank you for reaching out. We have received your query and our team will get back to you shortly.";
                    contentStr = payload.content;
                    text = "Generating response draft...";
                } else if (actionType === 'escalate') {
                    text = "Critical priority detected. Escalating to incident response.";
                } else {
                    text = "Spam detected. Moving to archive.";
                }

                // Show overlay
                showOverlay(actionType, text, contentStr);

                // Wait for visual effect
                await sleep(2000);

                // 2. Step the actual backend Env
                const res = await fetch('/step', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ action: payload })
                });
                const data = await res.json();

                // Update reward
                let r = data.reward;
                totalReward += r;
                steps++;

                document.getElementById('overlay-reward').innerText = (r > 0 ? "+" : "") + r.toFixed(2) + " Reward";
                document.getElementById('overlay-reward').className = "reward-badge " + (r < 0 ? "negative" : "");

                updateCounters(actionType);
                updateStatsUI();

                // 3. Animate out
                await sleep(1500);
                const item = document.getElementById('email-item');
                if (item) {
                    item.className = "email-item anim-" + actionType;
                }
                document.getElementById('agent-overlay').classList.remove('visible');

                await sleep(500);

                // 4. Load next observation
                if (data.done) {
                    currentEmail = null;
                    document.getElementById('reading-pane').style.display = 'none';
                    document.getElementById('empty-state').style.display = 'flex';
                    document.getElementById('email-list').innerHTML = "";
                    break;
                } else {
                    currentEmail = data.observation.email;
                    stats.inbox = data.observation.inbox_remaining;
                    updateStatsUI();
                    renderEmailList(currentEmail);
                    renderReadingPane(currentEmail);
                }
            }

            isAgentRunning = false;
            document.getElementById('btn-start').disabled = false;
            document.getElementById('btn-start').innerText = "🤖 Start AI Agent";
            document.getElementById('badge-inbox').innerText = 0;
        }

        function showOverlay(actionType, desc, content) {
            const overlay = document.getElementById('agent-overlay');
            const chip = document.getElementById('overlay-action');
            const rep = document.getElementById('overlay-reply');

            chip.innerText = actionType.toUpperCase();
            chip.className = "action-chip " + actionType;
            document.getElementById('overlay-desc').innerText = desc;

            if (content) {
                rep.style.display = 'block';
                rep.innerText = content;
            } else {
                rep.style.display = 'none';
            }

            document.getElementById('overlay-reward').innerText = "Calculating...";
            document.getElementById('overlay-reward').className = "reward-badge";

            overlay.classList.add('visible');
        }

        function updateCounters(actionType) {
            stats.inbox--;
            if (actionType === 'archive') stats.archive++;
            if (actionType === 'escalate') stats.escalated++;
            if (actionType === 'reply') stats.replied++;
        }

        // Initialize display
        resetEnv();

    </script>
</body>

</html>
